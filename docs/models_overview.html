<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flugzeugmodelle – Übersicht</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/models_overview.css">
  <link rel="stylesheet" href="css/nav.css">
  <script src="js/site_map.js" defer></script>
  <script src="js/nav.js" defer></script>  
</head>
<body>
  <div class="meta" id="meta">Lade Daten …</div>
  
  <div class="bar">
    <input id="q" placeholder="Suche (ID, Reg, Typ, Bemalung …)" />
    <select id="group">
      <option value="">Alle Airline-Gruppen</option>
    </select>
    <select id="airline">
      <option value="">Alle Airlines</option>
    </select>
    <select id="type">
      <option value="">Alle Flugzeugtypen</option>
    </select>
    <select id="scale">
      <option value="">Alle Maßstäbe</option>
    </select>
    <select id="flown">
      <option value="">Mitgeflogen: egal</option>
      <option value="true">Mitgeflogen: ja</option>
      <option value="false">Mitgeflogen: nein</option>
    </select>
    <div class="statusBox">
      <div class="statusTitle">Status</div>
      <div class="statusRow">
        <label class="chk"><input type="checkbox" id="fOwned" checked> vorhanden</label>
        <label class="chk"><input type="checkbox" id="fOrdered" checked> bestellt</label>
        <label class="chk"><input type="checkbox" id="fWishlist"> Wunsch</label>
      </div>
    </div>
    
    <div class="columnLauncher">
      <button type="button" id="openColumns" class="columnOpenBtn">Spalten</button>
      <button type="button" id="reset" class="resetBtn">Reset</button>
    </div>
    
    <div id="columnPanelBackdrop" class="columnPanelBackdrop" hidden></div>
    
    <div id="columnPanel" class="columnPanel" hidden>
      <div class="columnPanelHead">
        <div class="columnPanelTitle">Optionale Spalten</div>
        <button type="button" id="closeColumns" class="columnCloseBtn" aria-label="Schließen">×</button>
      </div>
    
      <div class="columnActions">
        <button type="button" id="selectAllColumns">Alle auswählen</button>
        <button type="button" id="clearAllColumns">Alle abwählen</button>
      </div>

      <div id="measureModeBox" class="measureModeBox" hidden>
        <div class="measureModeTitle">Maßdarstellung</div>
        <div class="measureModeBtns">
          <button type="button" id="measureOriginal">Original</button>
          <button type="button" id="measureScale400">1:400</button>
        </div>
      </div>
      
      <div class="columnRow">
        <label class="chk"><input type="checkbox" class="colToggle" value="shop"> Shop</label>
        <label class="chk"><input type="checkbox" class="colToggle" value="type_stock"> Typ-Bestand</label>
        <label class="chk"><input type="checkbox" class="colToggle" value="role"> Rolle</label>
        <label class="chk"><input type="checkbox" class="colToggle" value="fuselage"> Rumpf</label>
        <label class="chk"><input type="checkbox" class="colToggle" value="market_segment"> Segment</label>
        <label class="chk"><input type="checkbox" class="colToggle" value="aircraft_kind"> Flugzeugart</label>
        <label class="chk"><input type="checkbox" class="colToggle" value="aircraft_status"> Status</label>
        <label class="chk"><input type="checkbox" class="colToggle" value="first_flight"> Erstflug</label>
        <label class="chk"><input type="checkbox" class="colToggle" value="propulsion"> Antrieb</label>
        <label class="chk"><input type="checkbox" class="colToggle" value="engines"> Triebwerke</label>
        <label class="chk"><input type="checkbox" class="colToggle" value="range_class"> Reichweite</label>
        <label class="chk"><input type="checkbox" class="colToggle" value="passengers"> Passagiere</label>
        <label class="chk"><input type="checkbox" class="colToggle" value="length_m"> Länge</label>
        <label class="chk"><input type="checkbox" class="colToggle" value="wingspan_m"> Spannweite</label>
        <label class="chk"><input type="checkbox" class="colToggle" value="height_m"> Höhe</label>
      </div>
    </div>
  
  </div>
  
  <div class="right">
    <span class="small" id="activeFilters"></span>
    <span class="small" id="count"></span>
  </div>
    
  <div id="content"></div>
  
  <script src="js/time.js" defer></script>
  <script src="js/models_overview.js" defer></script>
</body>
</html>
