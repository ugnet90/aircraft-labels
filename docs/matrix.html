<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Matrix: Airlines × Typen</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/matrix.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="assets/favicon/site.webmanifest">
  
  <script src="js/site_map.js" defer></script>
  <script src="js/nav.js" defer></script>  
</head>
<body>

  <div class="top">
    <span class="muted" >Airlines × Typen: </span>
    <span class="muted" id="meta"></span>
  </div>

  <!-- Desktop/Tablet controls -->
  <div class="card controls" id="desktopControls">
    <label class="muted">Airline enthält:
      <input id="airQ" placeholder="z.B. Austrian" />
    </label>
  
    <label class="muted">Typ enthält:
      <input id="typeQ" placeholder="z.B. A320" />
    </label>
  
    <div class="statusFilter" role="group" aria-label="Status">
      <span class="statusFilterTitle">Status</span>
    
      <label>
        <input type="checkbox" id="statusPresent" checked>
        vorhanden
      </label>
    
      <label>
        <input type="checkbox" id="statusOrdered" checked>
        bestellt
      </label>
    
      <label>
        <input type="checkbox" id="statusWishlist" checked>
        Wunsch
      </label>
    
      <label>
        <input type="checkbox" id="statusMissing">
        fehlt
      </label>
    </div>
  </div>

  <!-- Desktop/Tablet matrix -->
  <div class="card" id="matrixCard">
    <div id="topScroll"><div id="topScrollInner"></div></div>
    <div id="tableWrap">
      <table id="tbl"></table>
    </div>
  </div>

  <!-- Mobile portrait hint -->
  <div class="card rotateHint" id="rotateHint">
    Bitte iPhone quer drehen, um die Matrix anzuzeigen.
  </div>
  
  <script src="js/matrix.js" defer></script>
</body>
</html>
