<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Matrix: Airlines × Typen</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/matrix.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="assets/favicon/site.webmanifest">
  
  <script src="js/site_map.js" defer></script>
  <script src="js/nav.js" defer></script>  
</head>
<body>

  <div class="top">
    <span class="muted" >Airlines × Typen: </span>
    <span class="muted" id="meta"></span>
  </div>

  <!-- Desktop/Tablet controls -->
  <div class="card controls" id="desktopControls">
    <label class="muted">Airline enthält:
      <input id="airQ" placeholder="z.B. Austrian" />
    </label>
  
    <label class="muted">Typ enthält:
      <input id="typeQ" placeholder="z.B. A320" />
    </label>
  
    <fieldset class="statusFilter">
      <legend>Status</legend>
  
      <label>
        <input type="checkbox" id="statusPresent" checked>
        vorhanden
      </label>
  
      <label>
        <input type="checkbox" id="statusOrdered" checked>
        bestellt
      </label>
  
      <label>
        <input type="checkbox" id="statusWishlist" checked>
        Wunsch
      </label>
  
      <label>
        <input type="checkbox" id="statusMissing">
        fehlt
      </label>
    </fieldset>
  </div>

  <!-- Desktop/Tablet matrix -->
  <div class="card" id="matrixCard">
    <div id="topScroll"><div id="topScrollInner"></div></div>
    <div id="tableWrap">
      <table id="tbl"></table>
    </div>
  </div>

  <!-- Mobile controls + list -->
  <div class="card" id="mobileCard">
    <div class="controls" style="margin-bottom:10px">
      <label class="muted">Airline:
        <select id="mAir"></select>
      </label>
    
      <label class="muted">Typ-Suche:
        <input id="mTypeQ" placeholder="z.B. A320" />
      </label>
    
      <label class="muted">Nur Treffer:
        <select id="mOnlyNonZero">
          <option value="true">ja</option>
          <option value="false">nein</option>
        </select>
      </label>
    
      <fieldset class="statusFilter">
        <legend>Status</legend>
    
        <label>
          <input type="checkbox" id="mStatusPresent" checked>
          vorhanden
        </label>
    
        <label>
          <input type="checkbox" id="mStatusOrdered" checked>
          bestellt
        </label>
    
        <label>
          <input type="checkbox" id="mStatusWishlist" checked>
          Wunsch
        </label>
    
        <label>
          <input type="checkbox" id="mStatusMissing">
          fehlt
        </label>
      </fieldset>
    </div>
    
    <div class="muted" id="mMeta"></div>
    <table id="mobileTbl" style="width:100%;border-collapse:collapse;margin-top:10px">
      <thead>
        <tr>
          <th style="text-align:right;border-bottom:1px solid #eee;padding:6px 8px">#</th>
          <th style="text-align:left;border-bottom:1px solid #eee;padding:6px 8px">Typ</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

<script src="js/matrix.js" defer></script>
</body>
</html>
