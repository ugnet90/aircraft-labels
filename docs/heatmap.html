<!-- docs/heatmap.html -->
<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flight Heatmap</title>

  <!-- Deine bestehenden globalen Styles -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/heatmap.css" />
  <link rel="stylesheet" href="css/nav.css">
  <script src="js/site_map.js" defer></script>
  <script src="js/nav.js" defer></script>
  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
</head>
<body>
  <main class="heatmapLayout">
    <section class="kpis">
      <div class="kpi-section">
      
        <h2>Reise</h2>
        <div class="kpi-grid">
      
          <div class="kpi">
            <div class="kpi-title">Flugsegmente</div>
            <div class="kpi-value" id="kpiSegments"></div>
          </div>
      
          <div class="kpi">
            <div class="kpi-title">Besuchte Flughäfen</div>
            <div class="kpi-value" id="kpiAirports"></div>
          </div>
      
          <div class="kpi">
            <div class="kpi-title">Länder</div>
            <div class="kpi-value" id="kpiCountries"></div>
          </div>
      
          <div class="kpi">
            <div class="kpi-title">Gesamtdistanz</div>
            <div class="kpi-value" id="kpiDistance"></div>
          </div>
      
          <div class="kpi longest">
            <div class="kpi-title">Längste Route</div>
            <div class="kpi-value" id="kpiLongest"></div>
            <div class="kpi-route" id="kpiLongestRoute"></div>
          </div>
      
        </div>
      
      </div>
      
      
      <div class="kpi-section">
      
        <h2>Flugzeuge</h2>
        <div class="kpi-grid">
      
          <div class="kpi">
            <div class="kpi-title">Flugzeugtypen</div>
            <div class="kpi-value" id="kpiTypes"></div>
          </div>
      
          <div class="kpi">
            <div class="kpi-title">Registrierungen</div>
            <div class="kpi-value" id="kpiRegs"></div>
          </div>
      
          <div class="kpi">
            <div class="kpi-title">Top-Airline</div>
            <div class="kpi-value" id="kpiTopAirline"></div>
          </div>
      
          <div class="kpi">
            <div class="kpi-title">Fensterplatz</div>
            <div class="kpi-value" id="kpiWindow"></div>
          </div>
      
        </div>
      
      </div>
      <div class="controls">
        <label>
          View
          <select id="viewMode">
            <option value="combined" selected>Combined</option>
            <option value="airports">Airports</option>
            <option value="routes">Routes</option>
          </select>
        </label>
        
        <label>
          Max Routes
          <input id="maxRoutes" type="range" min="50" max="800" value="300" />
        </label>
        <span class="subtle" id="maxRoutesLabel">300</span>   
        <label>
          Route Strength
          <input id="routeStrength" type="range" min="0.5" max="3" step="0.1" value="1" />
        </label>
        <label>
          Radius
          <input id="radius" type="range" min="8" max="40" value="18" />
        </label>
        <label>
          Blur
          <input id="blur" type="range" min="8" max="40" value="20" />
        </label>
      </div>
    </section>

    <section class="mapWrap">
      <div id="mapWrap" class="map-wrap">
        <button id="mapMaxBtn" class="map-btn">⤢</button>
        <button id="mapCloseBtn" class="map-btn map-btn-close" style="display:none;">✕</button>
        <div id="map"></div>
      </div>
    </section>

    <section class="tables">
      <div class="tableCard">
        <div class="tableCard__title">Top Airports</div>
        <table class="simpleTable" id="tblAirports">
          <thead>
            <tr><th>IATA</th><th class="col-num">Count</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="tableCard">
        <div class="tableCard__title">Top Countries</div>
        <table class="simpleTable" id="tblCountries">
          <thead>
            <tr><th>Country</th><th class="col-num">Count</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="tableCard">
        <div class="tableCard__title">Top Routes</div>
        <table class="simpleTable" id="tblRoutes">
          <thead>
            <tr>
              <th>Route</th>
              <th class="col-num">Count</th>
              <th class="col-num">km</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>      
    </section>
  </main>

  <!-- Leaflet + Heat -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <script src="js/heatmap.js"></script>
</body>
</html>
