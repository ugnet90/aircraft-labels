<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Aircraft Labels</title>
  <link rel="stylesheet" href="labels.css">
</head>
<body>
  <div class="no-print-header">
    <strong>Aircraft Labels</strong> – 1 Labels<br>
    Drucken mit 100 % Skalierung und ohne Kopf-/Fußzeilen.
    <div>
      <button class="print-btn" onclick="window.print()">Drucken</button>
    </div>
  </div>

  <main class="sheet">
    
<div class="airline-break">
  <div class="airline-break-title">Air Berlin</div>
</div>
<article class="label">
  <div class="label-main">
    <p class="model-id">AB001</p>
    <p class="airline">Air Berlin</p>
    <p class="type">Airbus A320-200</p>
    <p class="reg">D-ABDQ</p>
    <p class="meta">Dragon Wings · 1:400</p>
  </div>
  <div class="qr-box">
    <img src="qr/AB001.png" alt="QR AB001">
  </div>
</article>

  </main>
</body>
</html>
