<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Aircraft Labels</title>
  <link rel="stylesheet" href="labels.css">
</head>
<body>
  <div class="no-print-header">
    <strong>Aircraft Labels</strong> – 4 Labels<br>
    Drucken mit 100 % Skalierung und ohne Kopf-/Fußzeilen.
    <div>
      <button class="print-btn" onclick="window.print()">Drucken</button>
    </div>
  </div>

  <main class="sheet">
    <div class="labelSlot">
  <article class="label">
    
    <span class="cut cut-tl"></span>
    <span class="cut cut-tr"></span>
    <span class="cut cut-bl"></span>
    <span class="cut cut-br"></span>
    

    <div class="label-left">
      
      <div class="airline">Austrian</div>
      <div class="type">Airbus A319-100</div>
      <div class="bottom-row">
        <div class="reg">Reg: OE-LDE</div>
      </div>
    </div>

    <div class="label-right">
      <div class="qr-box flown">
        <img src="qr/OS001.png" alt="QR OS001">
      </div>
      <div class="model-id-small">OS001</div>
    </div>
  </article>
</div>
<div class="labelSlot">
  <article class="label">
    
    <span class="cut cut-tl"></span>
    <span class="cut cut-tr"></span>
    <span class="cut cut-bl"></span>
    <span class="cut cut-br"></span>
    

    <div class="label-left">
      
      <div class="airline">Austrian</div>
      <div class="type">Airbus A321-100</div>
      <div class="bottom-row">
        <div class="reg">Reg: OE-LBB</div>
      </div>
    </div>

    <div class="label-right">
      <div class="qr-box flown">
        <img src="qr/OS002.png" alt="QR OS002">
      </div>
      <div class="model-id-small">OS002</div>
    </div>
  </article>
</div>
<div class="labelSlot">
  <article class="label">
    
    <span class="cut cut-tl"></span>
    <span class="cut cut-tr"></span>
    <span class="cut cut-bl"></span>
    <span class="cut cut-br"></span>
    

    <div class="label-left">
      
      <div class="airline">Austrian</div>
      <div class="type">Boeing 737-600</div>
      <div class="bottom-row">
        <div class="reg">Reg: OE-LNL</div>
      </div>
    </div>

    <div class="label-right">
      <div class="qr-box">
        <img src="qr/OS004.png" alt="QR OS004">
      </div>
      <div class="model-id-small">OS004</div>
    </div>
  </article>
</div>
<div class="labelSlot">
  <article class="label">
    
    <span class="cut cut-tl"></span>
    <span class="cut cut-tr"></span>
    <span class="cut cut-bl"></span>
    <span class="cut cut-br"></span>
    

    <div class="label-left">
      
      <div class="airline">Austrian Arrows</div>
      <div class="type">Fokker 100</div>
      <div class="bottom-row">
        <div class="reg">Reg: OE-LVK</div>
      </div>
    </div>

    <div class="label-right">
      <div class="qr-box">
        <img src="qr/OS003.png" alt="QR OS003">
      </div>
      <div class="model-id-small">OS003</div>
    </div>
  </article>
</div>

  </main>
</body>
</html>
