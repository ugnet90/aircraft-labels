<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Aircraft Labels</title>
  <link rel="stylesheet" href="labels.css">
</head>
<body>
  <div class="no-print-header">
    <strong>Aircraft Labels</strong> – 2 Labels<br>
    Drucken mit 100 % Skalierung und ohne Kopf-/Fußzeilen.
    <div>
      <button class="print-btn" onclick="window.print()">Drucken</button>
    </div>
  </div>

  <main class="sheet">
    
<div class="airline-break">
  <div class="airline-break-title">Antonov Airlines</div>
</div>
<article class="label">
  <div class="label-left">
    <div class="airline">Antonov Airlines</div>
    <div class="type">Antonov AN-225 Mriya</div>

    <div class="bottom-row">
      <div class="reg">Reg: UR-82060</div>
    </div>
  </div>

  <div class="label-right">
    <div class="qr-box">
      <img src="qr/SO001.png" alt="QR SO001">
    </div>
    <div class="model-id-small">SO001</div>
  </div>
</article>

<div class="airline-break">
  <div class="airline-break-title">Austrian</div>
</div>
<article class="label">
  <div class="label-left">
    <div class="airline">Austrian</div>
    <div class="type">Airbus A319-100</div>

    <div class="bottom-row">
      <div class="reg">Reg: OE-LDE</div>
    </div>
  </div>

  <div class="label-right">
    <div class="qr-box">
      <img src="qr/OS001.png" alt="QR OS001">
    </div>
    <div class="model-id-small">OS001</div>
  </div>
</article>

  </main>
</body>
</html>
