<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Airlines</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/airlines_overview.css">
  <link rel="stylesheet" href="css/nav.css">

  <script src="js/site_map.js" defer></script>
  <script src="js/nav.js" defer></script>
</head>
  
<body>
  <main>
    <div class="meta">
      Stand: <span id="meta">–</span>
    </div>

    <div class="bar">
      <input id="q" type="search" placeholder="Suche Airline-Gruppe">

      <select id="group">
        <option value="">Alle Airline-Gruppen</option>
      </select>

      <select id="flown">
        <option value="">Mitgeflogen: egal</option>
        <option value="true">Mitgeflogen: ja</option>
        <option value="false">Mitgeflogen: nein</option>
      </select>

      <button id="reset" type="button">Reset</button>
    </div>
    
    <div class="columnLauncher">
      <button type="button" id="openColumns" class="columnOpenBtn">Spalten</button>
    </div>
    
    <div id="columnPanelBackdrop" class="columnPanelBackdrop" hidden></div>
    
    <div id="columnPanel" class="columnPanel" hidden>
      <div class="columnPanelHead">
        <div class="columnPanelTitle">Optionale Spalten</div>
        <button type="button" id="closeColumns" class="columnCloseBtn" aria-label="Schließen">×</button>
      </div>
    
      <div class="columnActions">
        <button type="button" id="selectAllColumns">Alle auswählen</button>
        <button type="button" id="clearAllColumns">Alle abwählen</button>
      </div>
    
      <div class="columnRow">
        <label class="chk">
          <input type="checkbox" class="colToggle" value="price_total">
          <span>Preis</span>
        </label>
      
        <label class="chk">
          <input type="checkbox" class="colToggle" value="shipping_total">
          <span>Versandkosten</span>
        </label>
      
        <label class="chk">
          <input type="checkbox" class="colToggle" value="space_cm">
          <span>Platzbedarf</span>
        </label>
      </div>
    </div>
    
    <div id="activeFilters" class="small">Keine Filter aktiv</div>

    <div class="right">
      <span id="count" class="small">Lade Daten…</span>
    </div>

    <section id="content">
      <div class="small">Lade Daten…</div>
    </section>
  </main>

  <script src="js/time.js" defer></script>
  <script src="js/airlines_overview.js" defer></script>
</body>
</html>
