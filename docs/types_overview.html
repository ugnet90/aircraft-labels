<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Alle Flugzeugtypen</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/types_overview.css">
  <link rel="stylesheet" href="css/nav.css">
  <script src="js/site_map.js" defer></script>
  <script src="js/nav.js" defer></script>  
</head>
<body>
  <div class="top">
    <span class="muted" id="meta"></span>
  </div>

  <div class="legend">
    <span class="dot dotG"></span><span class="legendTxt">vorhanden</span>
    <span class="dot dotY"></span><span class="legendTxt">bestellt</span>
  </div>

  <div class="pageWrap">
    <div class="card controls">
    
      <div class="bar">
        <input id="q" placeholder="Suche (Typ / aircraft_id / Hersteller)" />
        <select id="manu"></select>
        <select id="wing"></select>
      </div>
    
      <div class="statusBox">
        <div class="statusTitle">Status</div>
        <div class="statusRow">
          <label class="chk"><input type="checkbox" id="fMissing" checked> fehlend</label>
          <label class="chk"><input type="checkbox" id="fOwned" checked> vorhanden</label>
          <label class="chk"><input type="checkbox" id="fOrdered" checked> bestellt</label>
        </div>
      </div>

      <div class="columnLauncher">
        <button type="button" id="openColumns" class="columnOpenBtn">Spalten</button>
      </div>

      <div id="columnPanelBackdrop" class="columnPanelBackdrop" hidden></div>

      <div id="columnPanel" class="columnPanel" hidden>
        <div class="columnPanelHead">
          <div class="columnPanelTitle">Optionale Spalten</div>
          <button type="button" id="closeColumns" class="columnCloseBtn" aria-label="Schließen">×</button>
        </div>

        <div class="columnActions">
          <button type="button" id="selectAllColumns">Alle auswählen</button>
          <button type="button" id="clearAllColumns">Alle abwählen</button>
        </div>

        <div id="measureModeBox" class="measureModeBox" hidden>
          <div class="measureModeTitle">Maßdarstellung</div>
          <div class="measureModeBtns">
            <button type="button" id="measureOriginal">Original</button>
            <button type="button" id="measureScale400">1:400</button>
          </div>
        </div>

        <div class="columnRow">
          <label class="columnChk"><input type="checkbox" class="colToggle" value="role"><span>Rolle</span></label>
          <label class="columnChk"><input type="checkbox" class="colToggle" value="fuselage"><span>Rumpf</span></label>
          <label class="columnChk"><input type="checkbox" class="colToggle" value="market_segment"><span>Segment</span></label>
          <label class="columnChk"><input type="checkbox" class="colToggle" value="aircraft_kind"><span>Flugzeugart</span></label>
          <label class="columnChk"><input type="checkbox" class="colToggle" value="aircraft_status"><span>Status</span></label>
          <label class="columnChk"><input type="checkbox" class="colToggle" value="first_flight"><span>Erstflug</span></label>
          <label class="columnChk"><input type="checkbox" class="colToggle" value="propulsion"><span>Antrieb</span></label>
          <label class="columnChk"><input type="checkbox" class="colToggle" value="engines"><span>Triebwerke</span></label>
          <label class="columnChk"><input type="checkbox" class="colToggle" value="range_class"><span>Reichweite</span></label>
          <label class="columnChk"><input type="checkbox" class="colToggle" value="passengers"><span>Passagiere</span></label>
          <label class="columnChk"><input type="checkbox" class="colToggle" value="length_m"><span>Länge</span></label>
          <label class="columnChk"><input type="checkbox" class="colToggle" value="wingspan_m"><span>Spannweite</span></label>
          <label class="columnChk"><input type="checkbox" class="colToggle" value="height_m"><span>Höhe</span></label>
        </div>
      </div>
      
      <div class="muted" id="count"></div>
    </div>
  </div>
  <div id="content"></div>
<script src="js/time.js" defer></script>
<script src="js/types_overview.js" defer></script>
</body>
</html>
