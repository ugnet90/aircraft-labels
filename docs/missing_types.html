<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fehlende Flugzeugtypen</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/missing_types.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="assets/favicon/site.webmanifest">
  
  <script src="js/site_map.js" defer></script>
  <script src="js/nav.js" defer></script>
</head>
<body>
  <div class="top">
    <span class="muted" id="meta"></span>
  </div>

  <div id="warn" class="card"></div>

  <div class="card controls">
    <label class="muted">Suche:
      <input id="q" placeholder="z.B. A320, 737, Dash …" />
    </label>

    <label class="muted">Hersteller:
      <select id="manu">
        <option value="">Alle</option>
      </select>
    </label>

    <label class="muted">Status:
      <select id="status">
        <option value="">Alle</option>
        <option value="missing">fehlend</option>
        <option value="ordered">bestellt</option>
      </select>
    </label>


    <button id="reset" class="btn" style="cursor:pointer;background:#fff">Reset</button>

    <span class="muted" id="count"></span>
  </div>
  
  <div id="activeFilters" class="small">Keine Filter aktiv</div>
  
  <div class="card tableWrap">
    <table id="tbl">
      <thead>
        <tr>
          <th data-sort="status">Status</th>
          <th data-sort="manufacturer">Hersteller</th>
          <th data-sort="Typ_anzeige">Flugzeugtyp</th>
          <th data-sort="aircraft_id" class="mono">aircraft_id</th>          
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

<script src="js/time.js" defer></script>
<script src="js/missing_types.js" defer></script>
</body>
</html>
