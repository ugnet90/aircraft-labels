<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shop-Übersicht</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/shops_overview.css">
  <link rel="stylesheet" href="css/nav.css">

  <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="assets/favicon/site.webmanifest">
  
  <script src="js/site_map.js" defer></script>
  <script src="js/nav.js" defer></script>
</head>

<body>
  <main>
    <div class="meta">
      Stand: <span id="meta">–</span>
    </div>

    <div class="bar">
      <input id="q" type="search" placeholder="Suche Shop oder Airline-Gruppe">

      <select id="group">
        <option value="">Alle Airline-Gruppen</option>
      </select>

    <select id="status">
      <option value="owned">Status: vorhanden</option>
      <option value="ordered">Status: bestellt</option>
      <option value="all" selected>Status: vorhanden + bestellt</option>
    </select>

      <select id="shopKnown">
        <option value="">Shop: alle</option>
        <option value="known">Shop vorhanden</option>
        <option value="missing">Shop fehlt</option>
      </select>

      <button id="reset" type="button">Reset</button>
    </div>

    <div id="activeFilters" class="small">Keine Filter aktiv</div>

    <div class="right">
      <span id="count" class="small">Lade Daten…</span>
    </div>

    <section id="content">
      <div class="small">Lade Daten…</div>
    </section>
  </main>

  <script src="js/time.js" defer></script>
  <script src="js/shops_overview.js" defer></script>
</body>
</html>
