name: Build Labels

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-labels.txt

      - name: Run label generator
        run: python tools/build_labels.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: labels
          path: |
            docs/labels.html
            docs/css/labels.css
            docs/assets/qr
