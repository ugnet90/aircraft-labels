name: Build Labels

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-labels.txt

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Run label generator
        run: python tools/build_labels.py

      - name: Generate PDF
        run: |
          python - << 'EOF'
          from pathlib import Path
          from playwright.sync_api import sync_playwright

          root = Path(".").resolve()
          html_path = root / "docs" / "labels" / "labels.html"
          pdf_path = root / "docs" / "labels" / "labels.pdf"

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto(html_path.as_uri())
              page.pdf(
                  path=str(pdf_path),
                  format="A4",
                  print_background=True,
                  margin={"top":"8mm","bottom":"8mm","left":"8mm","right":"8mm"}
              )
              browser.close()
          EOF

      - name: Commit generated labels
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/labels

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update aircraft labels and QR codes"
            git push
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: labels
          path: |
            docs/labels
