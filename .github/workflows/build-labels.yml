name: Build Labels

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-labels.txt

      - name: Run label generator
        run: python tools/build_labels.py

      - name: Commit generated labels
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/labels.html docs/css/labels.css docs/assets/qr

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update aircraft labels and QR codes"
            git push
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: labels
          path: |
            docs/labels.html
            docs/css/labels.css
            docs/assets/qr
